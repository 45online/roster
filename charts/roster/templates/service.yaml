{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "roster.fullname" . }}
  labels: {{- include "roster.labels" . | nindent 4 }}
  {{- with .Values.webhook.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.webhook.service.type }}
  selector: {{- include "roster.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: {{ .Values.webhook.port }}
      targetPort: webhook
      protocol: TCP
{{- end -}}
