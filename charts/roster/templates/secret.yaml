{{- /*
Only create a Secret when the user is providing creds inline (i.e.
not pointing at an existingSecret). This way the chart never
shadows a Secret already managed by Sealed Secrets / External
Secrets / SOPS / etc.
*/ -}}
{{- if not .Values.credentials.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "roster.secretName" . }}
  labels: {{- include "roster.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.credentials.github_token }}
  ROSTER_GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.jira_url }}
  ROSTER_JIRA_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.jira_email }}
  ROSTER_JIRA_EMAIL: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.jira_token }}
  ROSTER_JIRA_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.llm_provider }}
  ROSTER_LLM_PROVIDER: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.llm_base_url }}
  ROSTER_LLM_BASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.llm_model }}
  ROSTER_LLM_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.llm_api_key }}
  ROSTER_LLM_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.slack_token }}
  ROSTER_SLACK_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.credentials.webhook_secret }}
  ROSTER_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
{{- end -}}
