name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 90s ./...

      - name: go build
        run: go build -o bin/roster ./cmd/roster

      - name: smoke — roster --help
        run: ./bin/roster --help
