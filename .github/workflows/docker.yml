name: docker

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'git ref to build (tag or branch)'
        required: true
        default: 'main'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # workflow_dispatch fires on whatever branch you triggered from
      # (typically main), so type=ref/semver/event=tag don't match the
      # `inputs.ref` you actually want built. Pass the dispatched ref
      # explicitly via a raw tag for the dispatch path.
      # On a real "push tag" event the type=ref/semver entries below cover
      # full + major.minor variants; the dispatch-only raw tag is a
      # backfill aid that produces just <ref> + latest.
      - id: meta
        name: derive image tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.ref }},enable=${{ github.event_name == 'workflow_dispatch' && startsWith(inputs.ref, 'v') }}
            type=raw,value=latest

      - name: build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.ref || github.ref_name }}
            COMMIT=${{ github.sha }}
