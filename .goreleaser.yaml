# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: roster
    main: ./cmd/roster
    binary: roster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/45online/roster/internal/version.Version=v{{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE
      - LICENSE.upstream
      - NOTICE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "📚 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "🔧 Maintenance"
      order: 999

release:
  github:
    owner: 45online
    name: roster
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Roster {{ .Tag }}

    🤖 Roster — AI employee taking over GitHub-driven dev management.

    ### Installation

    ```bash
    # Via Go
    go install github.com/45online/roster/cmd/roster@{{ .Tag }}

    # Or download the binary below
    ```
  footer: |
    ---
    **Full Changelog**: https://github.com/45online/roster/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: roster
    repository:
      owner: 45online
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: 45online
      email: noreply@example.com
    homepage: https://github.com/45online/roster
    description: Roster — AI employee taking over GitHub-driven dev management
    license: MIT
    skip_upload: true
    install: |
      bin.install "roster"
    test: |
      system "#{bin}/roster", "--version"
